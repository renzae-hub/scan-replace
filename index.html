<!DOCTYPE html>
<html lang="de" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="google" content="notranslate">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Scan&Replace">
<meta name="theme-color" content="#111111">
<title>Scan&amp;Replace</title>

<!-- Externe Bibliotheken -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #111111;
    --surface:  #1E1E1E;
    --surface2: #272727;
    --border:   #333333;
    --red:      #E31010;
    --red-dark: #AA0000;
    --red-dim:  #4A0000;
    --text:     #F0F0F0;
    --muted:    #888888;
    --mono:     'Courier New', monospace;
    --safe-b:   env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
    overflow: hidden;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    background: #181818;
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .header-icon {
    width: 32px; height: 32px;
    background: var(--red);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 20px; height: 20px; }

  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #fff;
  }

  .version-badge {
    margin-left: auto;
    background: var(--surface2);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-family: var(--mono);
  }

  /* ── Tab Bar ── */
  .tabs {
    display: flex;
    background: #181818;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    text-transform: uppercase;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: var(--red);
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── Camera View ── */
  #camera-wrap {
    position: relative;
    width: 100%;
    height: 220px;
    background: #000;
    flex-shrink: 0;
    overflow: hidden;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  #scan-frame {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-rect {
    width: 260px; height: 140px;
    border: 2px solid rgba(255,255,255,0.55);
    border-radius: 6px;
    position: relative;
  }
  .scan-rect.scanning { border-color: var(--red); }

  /* Corner accents */
  .scan-rect::before, .scan-rect::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--red);
    border-style: solid;
  }
  .scan-rect::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-rect::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scan-line {
    display: none;
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    animation: scanline 1.5s linear infinite;
  }
  .scanning .scan-line { display: block; }

  @keyframes scanline {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  #cam-hint {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
  }

  /* ── Form Area ── */
  .form-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Status Banner ── */
  .status-banner {
    display: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-banner.hidden { display: none !important; }
  .status-banner.ok  { background: #0d2e0d; border: 1px solid #2a6b2a; color: #5dd95d; }
  .status-banner.err { background: var(--red-dim); border: 1px solid var(--red); color: #ff7070; }
  .status-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── Input Fields ── */
  .field-group { display: flex; flex-direction: column; gap: 3px; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .field-label svg { width: 13px; height: 13px; }

  input[type=text], textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 9px 11px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: 0.5px;
  }
  input[type=text]:focus, textarea:focus {
    border-color: #555;
  }
  textarea {
    font-size: 11px;
    color: var(--muted);
    resize: none;
    height: 42px;
    line-height: 1.4;
  }

  /* ── Slider ── */
  .slider-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px 8px;
  }

  .slider-header {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }
  .slider-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .slider-value {
    margin-left: auto;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    font-family: var(--mono);
    min-width: 50px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    margin-bottom: 4px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--red);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(227,16,16,0.25);
  }

  .slider-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
  }
  .slider-ticks span {
    font-size: 9px;
    color: var(--border);
    font-family: var(--mono);
  }
  .slider-ticks span.active { color: var(--red); font-weight: 700; }

  /* ── Buttons ── */
  .btn-area {
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-b));
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  .btn-scan { background: var(--red); }
  .btn-scan:disabled { background: #5a0000; color: rgba(255,255,255,0.4); }
  .btn-print { background: var(--red); }
  .btn-print:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── History Screen ── */
  .history-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
  }
  .history-count {
    font-size: 12px;
    color: var(--muted);
  }
  .btn-clear {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-size: 11px;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .history-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 10px;
    color: var(--border);
  }
  .history-empty svg { width: 56px; height: 56px; }
  .history-empty p { font-size: 14px; }

  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hc-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .hc-icon {
    width: 34px; height: 34px;
    background: var(--surface2);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--muted);
  }
  .hc-icon svg { width: 18px; height: 18px; }
  .hc-main { flex: 1; min-width: 0; }
  .hc-artnr {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hc-lot {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .hc-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2px;
  }
  .hc-ts { font-size: 10px; color: #555; }
  .hc-qty {
    font-size: 11px;
    font-weight: 700;
    color: var(--red);
    font-family: var(--mono);
  }
  .hc-actions {
    display: flex;
    gap: 6px;
  }
  .hc-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }
  .hc-btn:active { opacity: 0.7; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h3v3M17 20h3M20 17v3"/>
      </svg>
    </div>
    <h1>Scan&amp;Replace</h1>
    <span class="version-badge">v1.6.0</span>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('scan')">&#x1F4F7; Scan</div>
    <div class="tab" onclick="switchTab('history')">&#x1F4CB; Verlauf</div>
  </div>

  <!-- ══ SCAN SCREEN ══ -->
  <div class="screen active" id="screen-scan">

    <!-- 1. Kamera -->
    <div id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div id="scan-frame">
        <div class="scan-rect" id="scan-rect">
          <div class="scan-line"></div>
        </div>
      </div>
      <div id="cam-hint">Etikett mittig ausrichten</div>
    </div>

    <!-- 2. Felder -->
    <div class="form-area" id="form-area">

      <!-- Status -->
      <div class="status-banner hidden" id="status-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="status-icon">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
        </svg>
        <span id="status-text"></span>
      </div>

      <!-- Art.-Nr. -->
      <div class="field-group">
        <div class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          Art.-Nr.: (OCR)
        </div>
        <input type="text" id="field-artnr" placeholder="000 - 0000 - 000" autocomplete="off" spellcheck="false">
      </div>

      <!-- LOT -->
      <div class="field-group">
        <div class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
          LOT
        </div>
        <input type="text" id="field-lot" placeholder="z.B. 08082025A" autocomplete="off" spellcheck="false">
      </div>

      <!-- Rohdaten Barcode -->
      <div class="field-group" id="raw-wrap" style="display:none">
        <div class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 8v8M11 8v8M15 8v8M4 8h1M18 8h1"/></svg>
          Rohdaten (Barcode)
        </div>
        <textarea id="field-raw" readonly></textarea>
      </div>

      <!-- Menge Slider -->
      <div class="slider-wrap">
        <div class="slider-header">
          <span class="slider-label">&#x1F4E6; Menge</span>
          <span class="slider-value" id="qty-display">1 Stk.</span>
        </div>
        <input type="range" id="qty-slider" min="1" max="10" value="1">
        <div class="slider-ticks" id="qty-ticks"></div>
      </div>

    </div><!-- /form-area -->

    <!-- 3. Buttons -->
    <div class="btn-area">
      <button class="btn btn-scan" id="btn-scan" onclick="startScan()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
          <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        SCAN STARTEN
      </button>
      <button class="btn btn-print" id="btn-print" onclick="printLabel()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8" rx="1"/>
        </svg>
        DRUCKEN
      </button>
    </div>

  </div><!-- /screen-scan -->

  <!-- ══ HISTORY SCREEN ══ -->
  <div class="screen" id="screen-history">
    <div class="history-toolbar">
      <span class="history-count" id="history-count">0 Einträge</span>
      <button class="btn-clear" onclick="clearHistory()">Leeren</button>
    </div>
    <div class="history-area" id="history-area">
      <div class="history-empty" id="history-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <p>Noch keine Scans vorhanden</p>
      </div>
    </div>
  </div>

</div><!-- /app -->

<!-- ══ QR-Code hidden canvas ══ -->
<div id="qr-canvas" style="position:absolute;left:-9999px;top:-9999px;"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  SCAN & REPLACE  –  v1.6.0  –  Pure HTML/JS PWA
// ═══════════════════════════════════════════════════════════

// ── State ──────────────────────────────────────────────────
let stream      = null;
let isScanning  = false;
let isPrinting  = false;
let ocrWorker   = null;
let history     = JSON.parse(localStorage.getItem('sr_history') || '[]');

const video    = document.getElementById('video');
const scanRect = document.getElementById('scan-rect');

// ── Tabs ───────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab, .screen').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`screen-${name}`).classList.add('active');
  if (name === 'history') renderHistory();
}

// ── Camera ─────────────────────────────────────────────────
// Maximale Aufloesung: keine Begrenzung – Handy entscheidet selbst
async function initCamera() {
  try {
    // Erst: hoechste verfuegbare Aufloesung anfragen
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:       { ideal: 9999 },   // Handy gibt max. zurueck
        height:      { ideal: 9999 },
        advanced: [{ focusMode: 'continuous' }]
      },
      audio: false
    });
    video.srcObject = stream;

    // Tatsaechliche Aufloesung loggen (sichtbar in DevTools)
    stream.getVideoTracks().forEach(t => {
      const s = t.getSettings();
      console.log('[Scan&Replace] Kamera:', s.width + 'x' + s.height,
                  'fps:', s.frameRate, 'Geraet:', s.label || t.label);
    });
  } catch(e) {
    // Fallback: Standard-Constraints ohne Aufloesung erzwingen
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
      video.srcObject = stream;
    } catch(e2) {
      showStatus('Kamera nicht verfügbar: ' + e2.message, true);
    }
  }
}

// ── Slider ticks ───────────────────────────────────────────
(function buildTicks() {
  const wrap = document.getElementById('qty-ticks');
  for (let i = 1; i <= 10; i++) {
    const s = document.createElement('span');
    s.textContent = i;
    s.dataset.n = i;
    wrap.appendChild(s);
  }
})();

document.getElementById('qty-slider').addEventListener('input', function() {
  const v = this.value;
  document.getElementById('qty-display').textContent = v + ' Stück';
  document.querySelectorAll('#qty-ticks span').forEach(s => {
    s.classList.toggle('active', s.dataset.n == v);
  });
  updatePrintBtn();
});
// activate first tick
document.querySelector('#qty-ticks span').classList.add('active');

// ── Field change listeners ──────────────────────────────────
['field-artnr','field-lot'].forEach(id =>
  document.getElementById(id).addEventListener('input', updatePrintBtn)
);

function updatePrintBtn() {
  const ok = document.getElementById('field-artnr').value.trim() &&
             document.getElementById('field-lot').value.trim();
  document.getElementById('btn-print').disabled = !ok;
}

// ── Status Banner ──────────────────────────────────────────
let statusTimer;
function showStatus(msg, isError) {
  clearTimeout(statusTimer);
  const banner = document.getElementById('status-banner');
  const icon   = document.getElementById('status-icon');
  banner.className = 'status-banner ' + (isError ? 'err' : 'ok');
  document.getElementById('status-text').textContent = msg;
  icon.innerHTML = isError
    ? '<circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>'
    : '<circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/>';
  statusTimer = setTimeout(() => banner.classList.add('hidden'), 4000);
}

// ── OCR Worker (lazy init) ─────────────────────────────────
async function getOcrWorker() {
  if (ocrWorker) return ocrWorker;
  ocrWorker = await Tesseract.createWorker('deu', 1, {
    logger: () => {}
  });
  return ocrWorker;
}

// ── Capture frame from video ───────────────────────────────
// Nutzt ImageCapture API fuer hoechste Qualitaet wenn verfuegbar,
// sonst direktes Canvas-Rendering des Videostreams.
async function captureFrame() {
  // Weg 1: ImageCapture API – liefert das volle Sensor-Bild
  if (stream && 'ImageCapture' in window) {
    try {
      const track = stream.getVideoTracks()[0];
      const ic = new ImageCapture(track);
      const bitmap = await ic.grabFrame();   // volle Sensor-Aufloesung
      const canvas = document.createElement('canvas');
      canvas.width  = bitmap.width;
      canvas.height = bitmap.height;
      canvas.getContext('2d').drawImage(bitmap, 0, 0);
      bitmap.close();
      console.log('[Scan&Replace] ImageCapture:', canvas.width + 'x' + canvas.height);
      return canvas;
    } catch(e) {
      console.warn('[Scan&Replace] ImageCapture fehlgeschlagen, nutze Video-Frame:', e.message);
    }
  }

  // Weg 2: Video-Frame direkt (Fallback)
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth  || 1920;
  canvas.height = video.videoHeight || 1080;
  canvas.getContext('2d').drawImage(video, 0, 0);
  console.log('[Scan&Replace] VideoFrame:', canvas.width + 'x' + canvas.height);
  return canvas;
}

// ── Barcode detection (native BarcodeDetector API) ─────────
async function detectBarcode(canvas) {
  if (!('BarcodeDetector' in window)) return null;
  try {
    const detector = new BarcodeDetector({
      formats: ['data_matrix', 'qr_code']
    });
    const codes = await detector.detect(canvas);
    return codes.length ? codes[0].rawValue : null;
  } catch { return null; }
}

// ── GS1 LOT Extraction (AI-10) ─────────────────────────────
// Beispiel: 0104058784000323173008091008082025A
//   [01][04058784000323] = GTIN  (Index 0-15)
//   [17][300809]         = Datum (Index 16-23)
//   [10][08082025A]      = LOT   (Index 24-34, AI "10" = Stellen 24-25)
//   Ergebnis: slice(26) = "08082025A"
function extractLotFromBarcode(raw) {
  if (!raw) return null;

  // 1. Steuerzeichen / GS1-Praefix entfernen
  let s = raw
    .replace(/^\]d[0-9]/, '')
    .replace(/^\]C[0-9]/, '')
    .replace(/\x1d/g, '')
    .trim();

  // 2. Mit Klammern: (10)XXXXX
  const brk = s.match(/\(10\)([A-Z0-9]+)/i);
  if (brk) return brk[1];

  // 3. Ohne Klammern: nur alphanumerische Zeichen behalten
  const clean = s.replace(/[^0-9A-Za-z]/g, '').toUpperCase();

  // GS1-Struktur pruefen: AI-01 am Anfang, AI-17 ab Stelle 16
  if (clean.length >= 26 && clean.slice(0,2) === '01' && clean.slice(16,18) === '17') {
    // AI-10 muss exakt bei Index 24 stehen
    if (clean.slice(24,26) === '10') {
      return clean.slice(26);
    }
    // Fallback: suche "10" im Bereich 24-30
    for (let i = 24; i <= Math.min(30, clean.length - 3); i++) {
      if (clean.slice(i, i+2) === '10') {
        return clean.slice(i+2);
      }
    }
  }

  // 4. Letzter Ausweg: letzten Block >= 6 Zeichen nehmen
  const blocks = [...clean.matchAll(/[A-Z0-9]{6,}/g)];
  if (blocks.length) return blocks[blocks.length - 1][0];

  return null;
}

function extractLotFromOcr(text) {
  // Schlüsselwort
  const kw = text.match(/(?:LOT|Ch\.-?B\.|Charge|Batch|Losnummer)\s*[:\-]?\s*([A-Z0-9]{4,14})/i);
  if (kw) return kw[1];
  // 10+1 Muster
  const p = text.match(/\b(\d{10}[A-Z0-9])\b/i);
  if (p) return p[1];
  return null;
}

function extractArtNr(text) {
  const m = text.match(/\d{3}\s*[-–]\s*\d{4}\s*[-–]\s*\d{3}/);
  if (!m) return null;
  const digits = m[0].replace(/[^\d]/g, '');
  if (digits.length === 10) {
    return `${digits.slice(0,3)} - ${digits.slice(3,7)} - ${digits.slice(7)}`;
  }
  return m[0].trim();
}

// ── SCAN ───────────────────────────────────────────────────
async function startScan() {
  if (isScanning) return;
  if (!stream) { showStatus('Kamera nicht bereit', true); return; }

  isScanning = true;
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> SCANNE…';
  scanRect.classList.add('scanning');

  // Felder vollstaendig leeren vor neuem Scan
  document.getElementById('field-artnr').value = '';
  document.getElementById('field-lot').value   = '';
  document.getElementById('field-raw').value   = '';
  document.getElementById('raw-wrap').style.display = 'none';
  document.getElementById('status-banner').classList.add('hidden');
  updatePrintBtn();

  try {
    // Kurz warten damit Kamera fokussiert
    // Autofokus-Zeit: 600ms fuer maximale Schaerfe
    await new Promise(r => setTimeout(r, 600));
    const canvas = await captureFrame();   // async wegen ImageCapture

    // Parallel: OCR + Barcode
    const [ocrResult, barcodeRaw] = await Promise.all([
      getOcrWorker().then(w => w.recognize(canvas)),
      detectBarcode(canvas)
    ]);

    const ocrText = ocrResult.data.text;

    // Art.-Nr.
    const artNr = extractArtNr(ocrText);
    if (artNr) document.getElementById('field-artnr').value = artNr;

    // LOT
    let lot = null;
    if (barcodeRaw) {
      document.getElementById('field-raw').value = barcodeRaw;
      document.getElementById('raw-wrap').style.display = '';
      lot = extractLotFromBarcode(barcodeRaw);
    }
    if (!lot) lot = extractLotFromOcr(ocrText);
    if (lot) document.getElementById('field-lot').value = lot;

    updatePrintBtn();

    if (artNr || lot) {
      showStatus('Scan erfolgreich', false);
      if ('vibrate' in navigator) navigator.vibrate(80);
    } else {
      showStatus('Keine Daten erkannt – bitte erneut versuchen', true);
    }
  } catch(e) {
    showStatus('Fehler: ' + e.message, true);
  } finally {
    isScanning = false;
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>SCAN STARTEN`;
    scanRect.classList.remove('scanning');
  }
}

// ── QR-Code als DataURL ────────────────────────────────────
function generateQrDataUrl(text) {
  return new Promise((resolve) => {
    const div = document.getElementById('qr-canvas');
    div.innerHTML = '';
    const qr = new QRCode(div, {
      text, width: 200, height: 200,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => {
      const img = div.querySelector('img') || div.querySelector('canvas');
      if (img && img.tagName === 'IMG') resolve(img.src);
      else if (img && img.tagName === 'CANVAS') resolve(img.toDataURL());
      else resolve(null);
    }, 200);
  });
}

// ── PDF Etikett erstellen ──────────────────────────────────
async function buildPdf(artNr, lot, qty) {
  const { jsPDF } = window.jspdf;
  // 100×60 mm
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [100, 60] });

  // Hintergrund
  pdf.setFillColor(255, 255, 255);
  pdf.rect(0, 0, 100, 60, 'F');

  // Art.-Nr.
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(18);
  pdf.setTextColor(0);
  pdf.text(artNr, 5, 14);

  // Trennlinie
  pdf.setDrawColor(180);
  pdf.setLineWidth(0.4);
  pdf.line(5, 17, 95, 17);

  // LOT
  pdf.setFontSize(11);
  pdf.setFont('helvetica', 'bold');
  pdf.text('LOT:', 5, 25);
  pdf.setFont('helvetica', 'normal');
  pdf.text(lot, 20, 25);

  // Quantity – Klarschrift
  pdf.setFont('helvetica', 'bold');
  pdf.setFontSize(11);
  pdf.text('Quantity:', 5, 33);
  pdf.setFont('helvetica', 'normal');
  pdf.text(`${qty}`, 26, 33);

  // QR-Code unten rechts (5 mm Abstand vom Rand)
  // QR-Code enthaelt: Art.-Nr.;LOT;Menge
  const qrData = `${artNr};${lot};${qty}`;
  const qrUrl = await generateQrDataUrl(qrData);
  if (qrUrl) {
    // Position: rechts=95, unten=55, Groesse=32x32mm
    pdf.addImage(qrUrl, 'PNG', 63, 23, 32, 32);
    // Kleiner Hinweistext unter QR
    pdf.setFontSize(6);
    pdf.setTextColor(150);
    pdf.setFont('helvetica', 'normal');
    pdf.text('Art.-Nr. | LOT | Menge', 63, 57);
    pdf.setTextColor(0);
  }

  return pdf;
}

// ── DRUCKEN ────────────────────────────────────────────────
async function printLabel() {
  if (isPrinting) return;
  const artNr = document.getElementById('field-artnr').value.trim();
  const lot   = document.getElementById('field-lot').value.trim();
  const qty   = parseInt(document.getElementById('qty-slider').value);

  if (!artNr || !lot) { showStatus('Bitte Art.-Nr. und LOT ausfüllen', true); return; }

  isPrinting = true;
  const btn = document.getElementById('btn-print');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> ERSTELLE…';

  try {
    const pdf = await buildPdf(artNr, lot, qty);

    // Drucken via Browser-Dialog
    const blob = pdf.output('blob');
    const url  = URL.createObjectURL(blob);
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = url;
    document.body.appendChild(iframe);
    iframe.onload = () => {
      try { iframe.contentWindow.print(); } catch {
        // Fallback: Download
        const a = document.createElement('a');
        a.href = url;
        a.download = `Etikett_${lot}.pdf`;
        a.click();
      }
    };

    // Fallback-Download immer anbieten
    const a = document.createElement('a');
    a.href = url;
    a.download = `Etikett_${lot}.pdf`;
    a.click();

    // In Verlauf speichern
    const entry = {
      id: Date.now(),
      artNr, lot, qty,
      ts: new Date().toISOString()
    };
    history.unshift(entry);
    if (history.length > 200) history.pop();
    localStorage.setItem('sr_history', JSON.stringify(history));

    showStatus('Etikett erstellt & gespeichert ✓', false);
    if ('vibrate' in navigator) navigator.vibrate([60,40,60]);

    // Felder zurücksetzen
    document.getElementById('field-artnr').value = '';
    document.getElementById('field-lot').value   = '';
    document.getElementById('field-raw').value   = '';
    document.getElementById('raw-wrap').style.display = 'none';
    document.getElementById('qty-slider').value = '1';
    document.getElementById('qty-display').textContent = '1 Stk.';
    document.querySelectorAll('#qty-ticks span').forEach((s,i) =>
      s.classList.toggle('active', i===0));
    updatePrintBtn();

  } catch(e) {
    showStatus('Druck-Fehler: ' + e.message, true);
  } finally {
    isPrinting = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>DRUCKEN`;
    updatePrintBtn();
  }
}

// ── History Rendering ──────────────────────────────────────
function renderHistory() {
  const area  = document.getElementById('history-area');
  const empty = document.getElementById('history-empty');
  const count = document.getElementById('history-count');
  count.textContent = `${history.length} Eintrag${history.length !== 1 ? 'e' : ''}`;

  if (!history.length) {
    empty.style.display = 'flex';
    area.querySelectorAll('.history-card').forEach(c => c.remove());
    return;
  }
  empty.style.display = 'none';

  // Rebuild
  area.querySelectorAll('.history-card').forEach(c => c.remove());
  history.forEach(e => {
    const d = new Date(e.ts);
    const ts = d.toLocaleDateString('de-DE') + ' ' +
               d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const card = document.createElement('div');
    card.className = 'history-card';
    card.innerHTML = `
      <div class="hc-top">
        <div class="hc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M17 20h3M20 17v3"/></svg>
        </div>
        <div class="hc-main">
          <div class="hc-artnr">${e.artNr}</div>
          <div class="hc-lot">LOT: ${e.lot}</div>
        </div>
      </div>
      <div class="hc-meta">
        <span class="hc-ts">${ts}</span>
        <span class="hc-qty">${e.qty}</span>
      </div>
      <div class="hc-actions">
        <button class="hc-btn" onclick="reprintEntry(${e.id})">&#x1F5A8; Drucken</button>
        <button class="hc-btn" onclick="deleteEntry(${e.id})">&#x1F5D1; Löschen</button>
      </div>`;
    area.appendChild(card);
  });
}

async function reprintEntry(id) {
  const e = history.find(h => h.id === id);
  if (!e) return;
  try {
    const pdf  = await buildPdf(e.artNr, e.lot, e.qty);
    const url  = URL.createObjectURL(pdf.output('blob'));
    const a    = document.createElement('a');
    a.href = url; a.download = `Etikett_${e.lot}.pdf`; a.click();
    showStatus('Nachdruck erstellt ✓', false);
    switchTab('scan');
  } catch(err) {
    showStatus('Fehler: ' + err.message, true);
  }
}

function deleteEntry(id) {
  history = history.filter(h => h.id !== id);
  localStorage.setItem('sr_history', JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  if (!confirm('Gesamten Verlauf löschen?')) return;
  history = [];
  localStorage.removeItem('sr_history');
  renderHistory();
}

// ── Boot ───────────────────────────────────────────────────
initCamera();
// OCR im Hintergrund initialisieren (Warmup)
getOcrWorker().catch(() => {});
</script>
